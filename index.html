<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#F7F3EC"/>
<title>Lanka Trade Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F3EC;--surface:#FFFFFF;--surface-2:#F3EEE5;--surface-3:#ECE6DA;
  --gold:#C9A24B;--gold-dark:#9A7A2E;--gold-grad:linear-gradient(135deg,#D4A93F 0%,#C9A24B 45%,#9A7A2E 100%);
  --ink:#2B2620;--ink-soft:#5C564C;--gray-mid:#8A8275;
  --border:rgba(43,38,32,0.10);--border-2:rgba(43,38,32,0.16);
  --shadow:0 6px 24px rgba(43,38,32,0.08);
  --font-display:'Fraunces',Georgia,serif;--font-body:'Inter',-apple-system,sans-serif;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-body);min-height:100%}
body{padding:18px 14px 60px;max-width:760px;margin:0 auto}
h1{font-family:var(--font-display);font-weight:600;font-size:26px;letter-spacing:-.5px}
.sub{color:var(--gray-mid);font-size:13px;margin-top:3px;margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
input,select{width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:12px;color:var(--ink);padding:13px 14px;font-size:15px;font-family:inherit;outline:none}
input:focus,select:focus{border-color:var(--gold)}
.row{display:flex;gap:10px;margin-bottom:12px}
.row>div{flex:1}
button{font-family:inherit;cursor:pointer;border:none}
.btn{background:var(--gold-grad);color:#fff;font-weight:600;font-size:15px;padding:14px;border-radius:12px;width:100%;box-shadow:var(--shadow)}
.btn:active{transform:translateY(1px)}
.btn2{background:var(--surface);color:var(--gold-dark);border:1px solid var(--gold);font-weight:600;font-size:14px;padding:12px;border-radius:12px;width:100%;margin-top:8px}
.count{font-size:13px;color:var(--gray-mid);margin:14px 2px 8px}
.biz{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:9px}
.biz .nm{font-weight:600;font-size:15px;color:var(--ink)}
.biz .meta{font-size:12.5px;color:var(--gray-mid);margin-top:3px;line-height:1.5}
.tag{display:inline-block;background:var(--surface-3);color:var(--gold-dark);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:6px}
.ph{display:inline-block;margin-top:7px;font-size:13px;font-weight:600;color:var(--gold-dark);text-decoration:none}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;margin-right:6px}
.badge.buyer{background:#E8F0E2;color:#3f6b2e}
.badge.reseller{background:#FBEFD6;color:#9A7A2E}
.reason{font-size:12.5px;color:var(--ink-soft);margin-top:6px;line-height:1.45;font-style:italic}
.web{display:inline-block;margin-top:7px;font-size:13px;font-weight:600;color:#3f6b2e;text-decoration:none}
.wa{display:inline-block;font-size:12.5px;font-weight:600;color:#1f8a4c;text-decoration:none;margin-left:8px}
.wa:active{opacity:.6}
.map{color:var(--ink-soft);text-decoration:none;border-bottom:1px dotted var(--border-2)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin:0 2px 14px}
.chip{background:var(--surface-3);color:var(--ink-soft);font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--border)}
.chip:active{background:var(--surface-2)}
.bub{padding:11px 13px;border-radius:14px;margin-bottom:8px;font-size:14px;line-height:1.5;white-space:pre-wrap}
.bub.me{background:var(--gold-grad);color:#fff;margin-left:36px}
.bub.ai{background:var(--surface-2);color:var(--ink);margin-right:18px;border:1px solid var(--border)}
.bub.ai a{color:var(--gold-dark)}
.typing{font-size:13px;color:var(--gold-dark);padding:6px 4px}
.ph:active{opacity:.6}
.find{font-size:12px;color:var(--gray-mid);text-decoration:underline;margin-top:6px;display:inline-block}
.empty{text-align:center;color:var(--gray-mid);padding:30px 10px;font-size:14px}
.loading{text-align:center;color:var(--gold-dark);padding:18px;font-size:14px}
.sec{font-family:var(--font-display);font-size:16px;font-weight:600;margin:20px 2px 8px;color:var(--ink)}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--gold-soft,#e6d9b5);border-top-color:var(--gold);border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<h1>Lanka Trade Finder</h1>
<div class="sub">Type a product + area → find businesses that buy or sell it, with contacts.</div>

<div class="card">
  <label>Product</label>
  <input id="product" placeholder="e.g. white cotton gloves, welding rod, safety shoes" value="white cotton gloves"/>
  <div style="height:12px"></div>
  <div class="row">
    <div>
      <label>District</label>
      <select id="district">
        <option value="">All districts</option>
      </select>
    </div>
    <div>
      <label>Town / area (optional)</label>
      <input id="area" placeholder="e.g. Old Moor Street, Nugegoda"/>
    </div>
  </div>
  <button class="btn" onclick="runSearch()">🔍 Find buyers &amp; sellers</button>
  <button class="btn2" onclick="deepSearch()">🌐 Deep search the web (live)</button>
  <button class="btn2" onclick="showHistory()">📋 Contacted history</button>
</div>

<div class="chips" id="recentChips"></div>
<div id="results"></div>

<div class="card" id="chatCard" style="margin-top:18px">
  <div style="font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:4px">💬 Ask the Trade Assistant</div>
  <div style="font-size:12.5px;color:var(--gray-mid);margin-bottom:12px">Knows all your shops. Ask anything, or get an outreach message written.</div>
  <div id="chatLog" style="max-height:340px;overflow-y:auto;margin-bottom:10px"></div>
  <div class="chips" id="chatSuggest" style="margin-bottom:10px">
    <span class="chip" onclick="askChat('Which food factories in Gampaha would buy gloves?')">Food factories needing gloves</span>
    <span class="chip" onclick="askChat('List 5 hardware shops in Colombo 12 with phone numbers')">Hardware in Colombo 12</span>
    <span class="chip" onclick="askChat('Write a short WhatsApp message to pitch white cotton gloves to a food factory')">Write a WhatsApp pitch</span>
  </div>
  <div class="row" style="margin-bottom:0">
    <div style="flex:1"><input id="chatInput" placeholder="e.g. Who buys welding rods in Colombo? Write them a pitch." onkeydown="if(event.key==='Enter')askChat()"/></div>
  </div>
  <button class="btn" style="margin-top:10px" onclick="askChat()">Ask</button>
</div>

<script>
const SB_URL="https://fceomyvmaqgwjdhgxgfh.supabase.co";
const SB_KEY="sb_publishable__a7JCWcdEW5ch1ljq25veg_x0cOXCSj";
let sb=null, CATALOG=[];
try{ sb=supabase.createClient(SB_URL,SB_KEY); }catch(e){ console.warn("supabase init",e); }
let CONTACTED={};   // shop_name(lower) -> latest {channel, at}
let CONTACT_LOG=[]; // full log rows

async function loadContacted(){
  if(!sb) return;
  try{
    const {data,error}=await sb.from('contacts_log').select('id,shop_name,channel,product,status,note,contacted_at').order('contacted_at',{ascending:false}).limit(2000);
    if(error){ console.warn(error); return; }
    CONTACT_LOG=data||[];
    CONTACTED={};
    for(const r of CONTACT_LOG){
      const k=(r.shop_name||'').toLowerCase().trim();
      if(!CONTACTED[k]) CONTACTED[k]={channel:r.channel, at:r.contacted_at};
    }
  }catch(e){ console.warn(e); }
}
function timeAgo(iso){
  if(!iso) return '';
  const d=(Date.now()-new Date(iso).getTime())/86400000;
  if(d<1) return 'today'; if(d<2) return 'yesterday';
  return Math.floor(d)+' days ago';
}
async function logContact(shop, channel, prod){
  // optimistic UI
  CONTACTED[(shop||'').toLowerCase().trim()]={channel, at:new Date().toISOString()};
  if(!sb) return;
  try{ await sb.from('contacts_log').insert({shop_name:shop, channel:channel, product:prod||''}); }catch(e){ console.warn(e); }
}
async function updateStatus(id, status){
  if(!sb) return;
  try{ await sb.from('contacts_log').update({status:status, updated_at:new Date().toISOString()}).eq('id',id);
    const row=CONTACT_LOG.find(r=>r.id===id); if(row) row.status=status;
  }catch(e){ console.warn(e); }
}
async function updateNote(id, note){
  if(!sb) return;
  try{ await sb.from('contacts_log').update({note:note, updated_at:new Date().toISOString()}).eq('id',id);
    const row=CONTACT_LOG.find(r=>r.id===id); if(row) row.note=note;
  }catch(e){ console.warn(e); }
}
function waSend(num, msg, shop, prod){
  let n=(num||'').replace(/[^0-9]/g,'');
  if(n.startsWith('0')) n='94'+n.slice(1); else if(!n.startsWith('94')&&n) n='94'+n;
  logContact(shop,'whatsapp',prod);
  window.open('https://wa.me/'+n+(msg?('?text='+encodeURIComponent(msg)):''),'_blank');
}
function emailSend(addr, subject, body, shop, prod){
  logContact(shop,'email',prod);
  window.open('mailto:'+(addr||'')+'?subject='+encodeURIComponent(subject||'')+'&body='+encodeURIComponent(body||''),'_blank');
}

const CATLABEL={gloves:"Gloves",safety:"Safety / PPE",hardware:"Hardware",welding:"Welding",
steel:"Steel / metal",tools:"Tools & machinery",industrial:"Industrial",
construction:"Construction firm",food:"Food factory","glove-maker":"Glove maker"};

function catsForProduct(p){p=p.toLowerCase();
 if(/glove/.test(p))return ["gloves","safety","glove-maker","construction","food","industrial"];
 if(/weld|electrode|\brod|filler ?wire|\bmig\b|\btig\b|\barc\b|flux|brazing|soldering|gouging/.test(p))return ["welding","tools","steel","construction","industrial"];
 if(/safety|ppe|helmet|hard ?hat|shoe|boot|mask|goggle|coverall|vest|harness|ear ?plug|ear ?muff|respirator|apron|face ?shield|hi-?vis|reflective|lanyard|fall protection|first aid/.test(p))return ["safety","gloves","construction","food","industrial"];
 if(/steel|stainless|metal|iron|alumin|brass|copper|sheet|plate|angle|channel|beam|\bpipe\b|tube|mesh|rebar|\bbar\b|coil|billet|ingot|galvani/.test(p))return ["steel","hardware","welding","construction","industrial"];
 if(/bolt|nut|screw|fasten|washer|rivet|hardware|\btool|abrasive|turn ?buckle|anchor|hinge|lock|padlock|chain|hoist|\bblock\b|rope|sling|\bwire\b|cable|valve|\bcock\b|fitting|flange|\bpump\b|bearing|grind|cutting ?disc|grinding ?wheel|sand ?paper|emery|drill|\bbit\b|spanner|wrench|hammer|plier|screwdriver|saw|blade|chisel|file|tape|measure|level|\bpaint|brush|roller|adhesive|glue|sealant|silicone|epoxy|clamp|\bvice\b|pulley|coupling|gasket|seal|\boil\b|grease|lubricant|hose|nozzle|spray|nail|tarpaulin|tarp|net|bucket|trolley|ladder|wheel ?barrow|barrow|caulking|grease gun|staple|ratchet|socket|allen|axe|planer|puller|trowel|knife|scissor|riveter|tin snip|hacksaw|tool box|bench vice|wire strip|jack|tile cutter|bolt cutter|pipe cutter|scaffold|jack stand|key|aluminium|upvc|pvc|gutter|beading|panel/.test(p))return ["hardware","tools","steel","welding","construction","industrial"];
 if(/machine|machinery|compressor|generator|\bmotor\b|hydraulic|pneumatic|automation|equipment|spare|gear ?box|conveyor|\bpress\b|lathe|cnc|forklift|crane|winch|\bfan\b|blower|boiler|chiller|cooling|grinder|welding machine|cut ?off|drill machine|mixer|vibrator/.test(p))return ["industrial","tools","welding","steel","hardware","construction"];
 if(/cement|tile|brick|\bsand\b|aggregate|concrete|plaster|\bpaint|primer|\bplumb|electric|\bcable\b|switch|socket|wiring|conduit|\bbuild|roof|gutter|door|window|sanitary|bathroom|fitting|insulation|waterproof|admixture|asphalt|bitumen|rebar|rubble|interlock|hollow block|precast|quarry|glass wool|scaffold|solar|timber|flooring|ceiling|wall finish|kitchen|bath fitting|water pump|water tank|granite|marble|tile|plywood|mdf|putty|emulsion|enamel|distemper|grout|epoxy|vinyl|laminate|terrazzo|wallpaper|cladding|partition|gypsum|amano|binding wire|barbed wire|wire mesh|chain link|gabion|purlin|g\.?i pipe|gi sheet|thread bar|nylon rope|wire rope|acro jack|u jack|t jack|p cone|caster|catwalk|coupling|circuit breaker|d board|light fitting|lamp|fan\b|cctv|access control|fire detection|commode|wash basin|faucet|shower|wpc|hdpe|ppr|fence|handrail|railing|staircase|wardrobe|cupboard|curtain|blind|signboard|banner|name board/.test(p))return ["construction","hardware","steel","industrial"];
 if(/clean|detergent|hygiene|sanitiz|disinfect|tissue|towel|trash|garbage|bin ?liner/.test(p))return ["food","industrial","safety","construction"];
 return null;}

async function loadCatalog(){
  if(!sb){ return; }
  try{
    const {data,error}=await sb.from('businesses').select('name,type,cat,addr,phone,district').limit(5000);
    if(error){ console.warn(error); return; }
    CATALOG=data||[];
    // build district dropdown
    const ds=[...new Set(CATALOG.map(c=>c.district).filter(Boolean))].sort();
    const sel=document.getElementById('district');
    ds.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  }catch(e){ console.warn(e); }
}

function cardFor(d){
  const phones=(d.phone||"").trim();
  const phHtml = phones
    ? phones.split(/,\s*/).map(p=>`<a class="ph" href="tel:${p.replace(/\s/g,'')}">📞 ${p}</a>`).join(" &nbsp; ")
    : `<a class="find" target="_blank" href="https://www.google.com/search?q=${encodeURIComponent((d.name||'')+' '+(d.district||'')+' Sri Lanka contact')}">Find contact ↗</a>`;
  return `<div class="biz"><div class="nm">${d.name||''}</div>
    <div class="meta">${d.addr||''}${d.district?' · '+d.district:''}</div>
    <span class="tag">${CATLABEL[d.cat]||d.type||d.cat||''}</span><br>${phHtml}</div>`;
}

function waLink(raw){
  let n=raw.replace(/[^0-9]/g,'');
  if(n.startsWith('0')) n='94'+n.slice(1);      // SL local 0xx -> 94xx
  else if(!n.startsWith('94') && n.length<=10) n='94'+n;
  return 'https://wa.me/'+n;
}
function leadCard(d){
  const phones=(d.phone||"").trim();
  const ck=(d.name||'').toLowerCase().trim();
  const contacted = CONTACTED[ck];
  const contactedBadge = contacted ? `<span class="badge" style="background:#dfeaff;color:#2456a6">✅ Contacted ${timeAgo(contacted.at)}</span>` : '';
  const phHtml = phones
    ? phones.split(/,\s*/).map(p=>{
        const tel=p.replace(/\s/g,'');
        const nm=(d.name||'').replace(/'/g,"\\'");
        const digits=tel.replace(/[^0-9]/g,'');
        // SL mobile: 07x... (10 digits starting 07), or 947x...
        const isMobile = /^07\d{8}$/.test(digits) || /^947\d{8}$/.test(digits);
        const wa = isMobile ? ` <a class="wa" href="javascript:void(0)" onclick="waSend('${p}','','${nm}','')">WhatsApp</a>` : '';
        return `<a class="ph" href="tel:${tel}">📞 ${p}</a>${wa}`;
      }).join("<br>")
    : `<a class="find" target="_blank" href="https://www.google.com/search?q=${encodeURIComponent((d.name||'')+' Sri Lanka contact')}">Find contact ↗</a>`;
  const role=(d.role||"").toLowerCase();
  const badge = role.includes('buy')
    ? `<span class="badge buyer">🟢 BUYER</span>`
    : (role.includes('resell')||role.includes('retail')||role.includes('distrib')
        ? `<span class="badge reseller">🟡 RESELLER</span>` : '');
  const web = (d.website||"").trim()
    ? `<br><a class="web" target="_blank" href="${d.website.startsWith('http')?d.website:'https://'+d.website}">🌐 ${d.website.replace(/^https?:\/\//,'').slice(0,40)}</a>` : '';
  const addr=(d.addr||'').trim();
  const addrHtml = addr
    ? `<a class="map" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(addr+' Sri Lanka')}">📍 ${addr}</a>${d.type?' · '+d.type:''}`
    : (d.type||'');
  return `<div class="biz"><div class="nm">${badge}${contactedBadge}${d.name||''}</div>
    <div class="meta">${addrHtml}</div>
    ${d.reason?`<div class="reason">💡 ${d.reason}</div>`:''}
    ${phHtml}${web}</div>`;
}

// Decide if a catalog company is a BUYER or RESELLER of the product, with a short reason.
function assess(d, product){
  const c=d.cat||'';
  const P=product||'the product';
  if(c==='hardware')   return {role:'Reseller', reason:`Hardware shop — can stock & resell ${P} to its customers`};
  if(c==='safety')     return {role:'Reseller', reason:`Safety/PPE dealer — already sells protective goods, can resell ${P}`};
  if(c==='tools')      return {role:'Reseller', reason:`Tools & machinery dealer — likely resells ${P}`};
  if(c==='glove-maker')return {role:'Reseller', reason:`Glove maker — competitor or possible bulk supply partner`};
  if(c==='welding')    return {role:'Buyer', reason:`Welding/fabrication shop — uses ${P} daily in work`};
  if(c==='steel')      return {role:'Buyer', reason:`Steel firm — consumes ${P} in fabrication & handling`};
  if(c==='construction')return {role:'Buyer', reason:`Construction firm — buys ${P} in bulk for site crews`};
  if(c==='food')       return {role:'Buyer', reason:`Food factory — needs ${P} for hygiene & handling`};
  if(c==='industrial') return {role:'Buyer', reason:`Industrial plant — uses ${P} in operations & safety`};
  if(c==='gloves')     return {role:'Buyer', reason:`Buys/uses ${P} in its line of work`};
  return {role:'', reason:''};
}

function offlineLeadCard(d, product){
  const a=assess(d, product);
  return leadCard({name:d.name, type:d.type||CATLABEL[d.cat]||'', addr:(d.addr||'')+(d.district?(' · '+d.district):''),
                   phone:d.phone, website:'', role:a.role, reason:a.reason});
}

function offlineMatches(product,district,area){
  let cats=catsForProduct(product);
  const toks=product.toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>3);
  // Fallback: unknown product → cast a wide hardware/industrial net so results never come back empty
  if(!cats) cats=["hardware","tools","steel","welding","construction","industrial"];
  const inArea=(d)=>{
    if(area)return ((d.addr||'')+' '+(d.district||'')).toLowerCase().includes(area.toLowerCase());
    if(district)return d.district===district;
    return true;
  };
  return CATALOG.filter(d=>{
    const txt=((d.name||'')+' '+(d.type||'')+' '+(d.cat||'')).toLowerCase();
    const ok=(cats&&cats.includes(d.cat))||toks.some(t=>txt.includes(t));
    if(!ok)return false;
    return inArea(d);
  });
}

function product(){return document.getElementById('product').value.trim();}

let LAST_OFFLINE=[]; // names shown offline, for dedupe against live

function addRecent(p){
  if(!p) return;
  let arr=[];
  try{ arr=JSON.parse(localStorage.getItem('recentProducts')||'[]'); }catch(e){}
  arr=arr.filter(x=>x.toLowerCase()!==p.toLowerCase());
  arr.unshift(p);
  arr=arr.slice(0,8);
  try{ localStorage.setItem('recentProducts',JSON.stringify(arr)); }catch(e){}
  renderChips();
}
function renderChips(){
  let arr=[];
  try{ arr=JSON.parse(localStorage.getItem('recentProducts')||'[]'); }catch(e){}
  const box=document.getElementById('recentChips');
  if(!box) return;
  box.innerHTML = arr.length ? ('<span style="font-size:11px;color:#8A8275;align-self:center;margin-right:2px">Recent:</span>'+
    arr.map(p=>`<span class="chip" onclick="useChip('${p.replace(/'/g,"\\'")}')">${p}</span>`).join('')) : '';
}
function useChip(p){ document.getElementById('product').value=p; runSearch(); }

function runSearch(){
  const p=product(), dist=document.getElementById('district').value, area=document.getElementById('area').value.trim();
  const root=document.getElementById('results');
  if(!CATALOG.length){ root.innerHTML='<div class="empty">Catalog still loading… check your connection and try again.</div>'; return; }
  addRecent(p);
  const m=offlineMatches(p,dist,area);
  LAST_OFFLINE=m.map(x=>(x.name||'').toLowerCase().trim());
  const where = area?('"'+area+'"'):(dist||'all areas');
  let html=`<div class="sec">📒 From your directory — ${m.length} match${m.length===1?'':'es'} (${where})</div>`;
  html += m.length ? m.map(d=>offlineLeadCard(d,p)).join('') : '<div class="empty">No matches in your directory for that product/area. Try the web deep search below.</div>';
  root.innerHTML=html;
}

async function deepSearch(){
  const p=product(), dist=document.getElementById('district').value, area=document.getElementById('area').value.trim();
  const root=document.getElementById('results');
  const where = area || dist || 'Sri Lanka';
  // show offline first
  runSearch();
  const live=document.createElement('div');
  live.innerHTML=`<div class="sec">🌐 Live web results</div><div class="loading"><span class="spin"></span>Searching the web for ${p} buyers & sellers in ${where}…</div>`;
  root.appendChild(live);

  const prompt=`You are a B2B sales-lead researcher for a supplier in Sri Lanka who wants to sell "${p}".
First think: which kinds of organisations in Sri Lanka would NEED or BUY "${p}"? (For example, for masks: hospitals, clinics, pharmacies, factories, salons, dental clinics; for gloves: food factories, hospitals, labs, cleaning firms; for welding rods: fabricators, workshops, shipyards.) Also think which shops/distributors would RESELL it.
Then search Rainbow Pages, Yellow Pages, Wedabima, Google, Facebook business pages, BOI/EDB and company websites for REAL such businesses in or near ${where}, Sri Lanka.

For EACH business decide:
- BUYER (would purchase "${p}" for their own use), or

// ---- AI Trade Assistant chat ----
let CHAT_HISTORY=[];
function catalogContext(){
  // Compact the catalog for the prompt (name | type | district | phone)
  return CATALOG.map(d=>`${d.name} | ${d.type||d.cat} | ${d.district||''} | ${d.phone||''}`).join('\n');
}
function bubble(text, who){
  const log=document.getElementById('chatLog');
  const div=document.createElement('div');
  div.className='bub '+(who==='me'?'me':'ai');
  // linkify phone numbers lightly
  div.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
  log.appendChild(div); log.scrollTop=log.scrollHeight;
  return div;
}
async function askChat(preset){
  const input=document.getElementById('chatInput');
  const q = preset || input.value.trim();
  if(!q) return;
  if(!preset) input.value='';
  bubble(q,'me');
  const t=document.createElement('div'); t.className='typing'; t.textContent='Assistant is thinking…';
  document.getElementById('chatLog').appendChild(t);

  const sys=`You are the Trade Assistant for a Sri Lankan importer/supplier. You help find business leads and write outreach.
You have a directory of ${CATALOG.length} real businesses below (format: Name | Type | District | Phone).
When the user asks who would buy/sell a product, pick the most relevant businesses FROM THIS DIRECTORY and explain briefly why each is a lead (buyer or reseller). Always include their phone number if present.
When asked to write a WhatsApp or email message, write a short, friendly, professional message in simple language suitable for Sri Lankan business owners. Keep WhatsApp messages under 60 words.
If the directory has nothing relevant, say so and suggest using the web deep search. Be concise and practical.

DIRECTORY:
${catalogContext()}`;

  CHAT_HISTORY.push({role:'user', content:q});
  // keep last 6 turns to stay light
  const recent=CHAT_HISTORY.slice(-6);
  const prompt = sys + "\n\nConversation so far:\n" +
    recent.map(m=>(m.role==='user'?'User: ':'Assistant: ')+m.content).join('\n') +
    "\n\nAnswer as the Assistant:";

  try{
    const res=await fetch('https://tycoon-vercel.vercel.app/api/trade-search',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:prompt})
    });
    const data=await res.json();
    const text=(data.text||"").trim() || "Sorry, I couldn't get an answer just now. Please try again.";
    t.remove();
    bubble(text,'ai');
    CHAT_HISTORY.push({role:'assistant', content:text});
  }catch(e){
    t.remove();
    bubble("Connection problem — please try again in a moment.",'ai');
  }
}

function statusColor(s){
  s=(s||'').toLowerCase();
  if(s.includes('interested')&&!s.includes('not')) return '#E8F0E2';
  if(s.includes('not')) return '#F6E2E2';
  if(s.includes('follow')) return '#FBEFD6';
  if(s.includes('won')) return '#DDEBFF';
  return '#ECE6DA';
}
function showHistory(){
  const root=document.getElementById('results');
  if(!CONTACT_LOG.length){
    root.innerHTML='<div class="sec">📋 Contacted history</div><div class="empty">No contacts logged yet. When you tap WhatsApp or Email on a shop, it gets recorded here.</div>';
    return;
  }
  const STAT=['Contacted','Interested','Follow up','Not interested','Won'];
  let html=`<div class="sec">📋 Contacted history — ${CONTACT_LOG.length} lead${CONTACT_LOG.length===1?'':'s'}</div>`;
  html += CONTACT_LOG.map(r=>{
    const ch = r.channel==='whatsapp' ? '🟢 WhatsApp' : (r.channel==='email' ? '✉️ Email' : '•');
    const cur=r.status||'Contacted';
    const opts=STAT.map(s=>`<option ${s===cur?'selected':''}>${s}</option>`).join('');
    return `<div class="biz" style="border-left:5px solid ${statusColor(cur)}">
      <div class="nm">${r.shop_name||''}</div>
      <div class="meta">${ch}${r.product?(' · '+r.product):''} · ${timeAgo(r.contacted_at)}</div>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
        <select onchange="updateStatus(${r.id}, this.value); this.parentElement.parentElement.style.borderLeftColor=statusColor(this.value)" style="flex:0 0 auto;width:auto;padding:7px 10px;font-size:13px">${opts}</select>
      </div>
      <input placeholder="Note: what did they say?" value="${(r.note||'').replace(/"/g,'&quot;')}" onblur="updateNote(${r.id}, this.value)" style="margin-top:8px;font-size:13px;padding:9px 11px"/>
    </div>`;
  }).join('');
  root.innerHTML=html;
}
